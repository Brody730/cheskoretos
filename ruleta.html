<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChesKoretos - Ruleta de Retos</title>
    <!-- Importar fuente Bangers de Google Fonts para estilo cómic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           RESET Y CONFIGURACION GLOBAL
           ═══════════════════════════════════════════ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111111;
            font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            /* Patron de puntos sutiles tipo feria */
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* ═══════════════════════════════════════════
           CONTENEDOR PRINCIPAL
           ═══════════════════════════════════════════ */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 700px;
            width: 100%;
        }

        /* ═══════════════════════════════════════════
           TITULO "ChesKoretos" ESTILO COMIC 3D
           ═══════════════════════════════════════════ */
        .logo-container {
            text-align: center;
            margin-bottom: 5px;
            position: relative;
        }

        .logo-text {
            font-family: 'Luckiest Guy', 'Bangers', 'Arial Black', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 3px;
            /* Efecto 3D con multiples sombras: roja, negra y naranja */
            text-shadow:
                /* Sombra roja cercana */
                3px 3px 0px #FF3300,
                6px 6px 0px #FF3300,
                /* Sombra negra profunda */
                9px 9px 0px #000000,
                12px 12px 0px #000000,
                /* Sombra naranja difuminada */
                15px 15px 20px rgba(255, 102, 0, 0.5);
            /* Gradiente de color en el texto: naranja a amarillo */
            background: linear-gradient(180deg, #FFCC00 0%, #FF6600 50%, #FF3300 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            /* Contorno negro grueso alrededor de las letras */
            -webkit-text-stroke: 2px #000000;
            position: relative;
            display: inline-block;
            transform: rotate(-2deg);
        }

        /* Destacar la letra C inicial */
        .logo-text .letter-c {
            font-size: 1.2em;
            vertical-align: middle;
            display: inline-block;
            transform: rotate(-5deg) translateY(-5px);
            color: #FF6600;
        }

        /* Destacar la letra K */
        .logo-text .letter-k {
            font-size: 1.3em;
            vertical-align: middle;
            display: inline-block;
            transform: rotate(3deg) translateY(-8px);
            background: linear-gradient(180deg, #FFCC00 0%, #FFCC00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-text-stroke: 3px #000000;
        }

        /* ESLOGAN debajo del titulo */
        .slogan {
            font-family: 'Bangers', 'Arial Black', sans-serif;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: #FFCC00;
            text-shadow:
                2px 2px 0px #000000,
                4px 4px 0px #FF3300,
                0 0 10px rgba(255, 204, 0, 0.5);
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 25px;
            transform: rotate(1deg);
        }

        /* Estrella decorativa a los lados del eslogan */
        .slogan::before,
        .slogan::after {
            content: " \2605 ";
            color: #FF3300;
            font-size: 1.2em;
        }

        /* ═══════════════════════════════════════════
           CONTENEDOR DE LA RULETA
           ═══════════════════════════════════════════ */
        .wheel-container {
            position: relative;
            width: min(90vw, 500px);
            height: min(90vw, 500px);
            margin-bottom: 30px;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .wheel-container.spinning {
            animation: wheelSpinGlow 0.25s ease-in-out infinite alternate;
        }

        @keyframes wheelSpinGlow {
            0% { filter: brightness(1) drop-shadow(0 0 15px rgba(255, 102, 0, 0.4)); transform: scale(1); }
            100% { filter: brightness(1.15) drop-shadow(0 0 35px rgba(255, 204, 0, 0.8)); transform: scale(1.015); }
        }

        .wheel-container.landing {
            animation: wheelLand 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes wheelLand {
            0%, 100% { transform: rotate(0deg) scale(1); }
            15% { transform: rotate(-3deg) scale(1.03); }
            30% { transform: rotate(2deg) scale(1.02); }
            45% { transform: rotate(-1.5deg) scale(1.01); }
            60% { transform: rotate(1deg) scale(1); }
        }

        .arrow-indicator.landing {
            animation: arrowBounce 0.7s ease;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            20% { transform: translateX(-50%) translateY(8px); }
            40% { transform: translateX(-50%) translateY(-4px); }
            60% { transform: translateX(-50%) translateY(3px); }
            80% { transform: translateX(-50%) translateY(-1px); }
        }

        .logo-container.spin-active .logo-text {
            animation: logoShake 0.15s ease-in-out infinite;
        }

        @keyframes logoShake {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg) scale(1.02); }
        }

        .flash-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            background: radial-gradient(circle, rgba(255, 204, 0, 0.4) 0%, transparent 70%);
            transition: opacity 0.15s ease;
        }

        .flash-overlay.active {
            opacity: 1;
        }

        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 8;
            animation: sparkFly 0.8s ease-out forwards;
        }

        @keyframes sparkFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* Canvas de la ruleta */
        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Borde exterior con efecto de luces de feria */
            box-shadow:
                0 0 0 8px #FFCC00,
                0 0 0 12px #000000,
                0 0 0 16px #FF3300,
                0 0 30px rgba(255, 102, 0, 0.6),
                0 0 60px rgba(255, 102, 0, 0.3);
        }

        /* ═══════════════════════════════════════════
           FLECHA INDICADORA (parte superior)
           ═══════════════════════════════════════════ */
        .arrow-indicator {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            /* Triangulo rojo usando bordes CSS */
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid #FF3300;
            /* Sombra para efecto 3D */
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.8));
        }

        /* Circulo decorativo en la base de la flecha */
        .arrow-indicator::after {
            content: '';
            position: absolute;
            top: -42px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: #FFCC00;
            border: 3px solid #000000;
            border-radius: 50%;
        }

        /* Centro de la ruleta con logo */
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: #000000;
            border: 5px solid #FFCC00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.8);
        }

        .wheel-center-text {
            font-family: 'Luckiest Guy', sans-serif;
            font-size: 2.2rem;
            color: #FFCC00;
            text-shadow: 2px 2px 0 #FF3300, -1px -1px 0 #000;
        }

        /* ═══════════════════════════════════════════
           BOTON "GIRAR"
           ═══════════════════════════════════════════ */
        .spin-button {
            font-family: 'Luckiest Guy', 'Bangers', 'Arial Black', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            padding: 15px 60px;
            background: linear-gradient(180deg, #FF6600 0%, #FF4400 50%, #FF3300 100%);
            color: #FFFFFF;
            border: 4px solid #000000;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 3px;
            /* Efecto 3D con sombras */
            box-shadow:
                0 6px 0 #000000,
                0 8px 20px rgba(255, 102, 0, 0.5);
            /* Contorno del texto */
            text-shadow:
                2px 2px 0 #000000,
                -1px -1px 0 #000000,
                1px -1px 0 #000000,
                -1px 1px 0 #000000;
            transition: all 0.1s ease;
            position: relative;
            margin-bottom: 25px;
        }

        /* Efecto hover */
        .spin-button:hover:not(:disabled) {
            background: linear-gradient(180deg, #FF7700 0%, #FF5500 50%, #FF4400 100%);
            transform: translateY(-2px);
            box-shadow:
                0 8px 0 #000000,
                0 12px 25px rgba(255, 102, 0, 0.7);
        }

        /* Efecto al presionar (active) - se "hunde" 3D */
        .spin-button:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow:
                0 0 0 #000000,
                0 2px 10px rgba(255, 102, 0, 0.5);
        }

        /* Estado deshabilitado durante el giro */
        .spin-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(6px);
            box-shadow: 0 0 0 #000000;
        }

        /* ═══════════════════════════════════════════
           AREA DE RESULTADO
           ═══════════════════════════════════════════ */
        .result-container {
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-label {
            font-family: 'Bangers', sans-serif;
            font-size: 1.3rem;
            color: #FFCC00;
            text-shadow: 2px 2px 0 #000, 0 0 10px rgba(255, 204, 0, 0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .result-label.visible {
            opacity: 1;
        }

        .result-text {
            font-family: 'Luckiest Guy', 'Bangers', 'Arial Black', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2.8rem);
            color: #FFFFFF;
            text-align: center;
            /* Sombra multiple para efecto comic */
            text-shadow:
                3px 3px 0 #FF3300,
                6px 6px 0 #000000,
                0 0 20px rgba(255, 102, 0, 0.8);
            padding: 15px 30px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 3px dashed #FFCC00;
            letter-spacing: 1px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .result-text.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Animacion de "bounce" cuando aparece el resultado */
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-text.animate {
            animation: bounceIn 0.6s ease forwards;
        }

        .result-description {
            font-family: 'Bangers', sans-serif;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: #FFFFFF;
            text-align: center;
            text-shadow: 2px 2px 0 #000000;
            padding: 10px 20px;
            margin-top: 10px;
            max-width: 500px;
            line-height: 1.4;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .result-description.visible {
            opacity: 1;
            transform: scale(1);
        }

        .result-description .price {
            color: #FFCC00;
            margin-top: 8px;
            display: block;
        }

        .inventor-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            width: 100%;
            max-width: 450px;
        }

        .inventor-container.visible {
            display: flex;
        }

        .inventor-label {
            font-family: 'Bangers', sans-serif;
            font-size: 1rem;
            color: #FFCC00;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .inventor-input {
            font-family: 'Bangers', sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #FFFFFF;
            border: 3px dashed #FFCC00;
            border-radius: 10px;
            outline: none;
            letter-spacing: 1px;
        }

        .inventor-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .inventor-input:focus {
            border-color: #FF6600;
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.5);
        }

        .inventor-save-btn {
            font-family: 'Luckiest Guy', 'Bangers', sans-serif;
            font-size: clamp(1rem, 3vw, 1.3rem);
            margin-top: 12px;
            padding: 10px 30px;
            background: linear-gradient(180deg, #9C27B0 0%, #7B1FA2 100%);
            color: #FFFFFF;
            border: 3px solid #000000;
            border-radius: 15px;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 4px 0 #000000;
            text-shadow: 2px 2px 0 #000;
            transition: all 0.1s ease;
        }

        .inventor-save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #000000;
        }

        .inventor-save-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000000;
        }

        .inventor-save-btn.saved {
            background: linear-gradient(180deg, #4CAF50 0%, #388E3C 100%);
        }

        .inventor-saved-msg {
            font-family: 'Bangers', sans-serif;
            font-size: 0.95rem;
            color: #4CAF50;
            text-shadow: 2px 2px 0 #000;
            margin-top: 8px;
            min-height: 1.2em;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .inventor-saved-msg.visible {
            opacity: 1;
        }

        .saved-retos-panel {
            margin-top: 20px;
            width: 100%;
            max-width: 450px;
            text-align: left;
        }

        .saved-retos-title {
            font-family: 'Bangers', sans-serif;
            font-size: 1rem;
            color: #FFCC00;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .saved-retos-list {
            list-style: none;
            max-height: 120px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.5);
            border: 2px dashed #FF6600;
            border-radius: 10px;
            padding: 8px 12px;
        }

        .saved-retos-list li {
            font-family: 'Bangers', sans-serif;
            font-size: 0.85rem;
            color: #FFFFFF;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 102, 0, 0.3);
            text-shadow: 1px 1px 0 #000;
        }

        .saved-retos-list li:last-child {
            border-bottom: none;
        }

        .saved-retos-list .reto-date {
            color: #FFCC00;
            font-size: 0.75rem;
        }

        .saved-retos-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .saved-retos-actions button {
            font-family: 'Bangers', sans-serif;
            font-size: 0.8rem;
            padding: 6px 14px;
            background: rgba(0, 0, 0, 0.7);
            color: #FFCC00;
            border: 2px solid #FFCC00;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .saved-retos-actions button:hover {
            background: #FF6600;
            color: #000;
        }

        .sound-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            font-family: 'Bangers', sans-serif;
            font-size: 0.9rem;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.8);
            color: #FFCC00;
            border: 2px solid #FFCC00;
            border-radius: 10px;
            cursor: pointer;
            z-index: 200;
            letter-spacing: 1px;
        }

        .sound-toggle.muted {
            color: #888;
            border-color: #555;
        }

        /* ═══════════════════════════════════════════
           DECORACIONES - LUCES DE FERIA
           ═══════════════════════════════════════════ */
        .lights {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .light {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE - Ajustes para moviles
           ═══════════════════════════════════════════ */
        @media (max-width: 480px) {
            .wheel-container {
                width: 95vw;
                height: 95vw;
            }

            .wheel-center {
                width: 60px;
                height: 60px;
            }

            .wheel-center-text {
                font-size: 1.6rem;
            }

            .spin-button {
                padding: 12px 40px;
                font-size: 1.5rem;
            }
        }

        /* ═══════════════════════════════════════════
           ANIMACION DE CONFETI (celebracion)
           ═══════════════════════════════════════════ */
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 100;
            animation: confettiFall 3s linear forwards;
        }

        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        body.shake {
            animation: screenShake 0.4s ease;
        }

        .result-text.jackpot {
            animation: jackpotPulse 0.8s ease infinite alternate;
        }

        @keyframes jackpotPulse {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); transform: scale(1); }
            100% { box-shadow: 0 0 50px rgba(255, 215, 0, 1); transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <!-- Luces de feria decorativas en el fondo -->
    <div class="lights" id="lights"></div>
    <div class="flash-overlay" id="flashOverlay"></div>
    <button class="sound-toggle" id="soundToggle" type="button" title="Activar/desactivar sonido">🔊 SONIDO</button>

    <div class="container">
        <!-- ═══════════════════════════════════════════
             TITULO PRINCIPAL
             ═══════════════════════════════════════════ -->
        <div class="logo-container" id="logoContainer">
            <h1 class="logo-text">
                <span class="letter-c">C</span>hes<span class="letter-k">K</span>oretos
            </h1>
            <p class="slogan">&iexcl;El chesco que te reta!</p>
        </div>

        <!-- ═══════════════════════════════════════════
             RULETA CON CANVAS
             ═══════════════════════════════════════════ -->
        <div class="wheel-container" id="wheelContainer">
            <!-- Flecha indicadora roja en la parte superior -->
            <div class="arrow-indicator" id="arrowIndicator"></div>
            <!-- Canvas donde se dibuja la ruleta -->
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <!-- Circulo central con la K -->
            <div class="wheel-center">
                <span class="wheel-center-text">K</span>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════
             BOTON PARA GIRAR
             ═══════════════════════════════════════════ -->
        <button class="spin-button" id="spinBtn" onclick="spinWheel()">
            &iexcl;GIRAR!
        </button>

        <!-- ═══════════════════════════════════════════
             AREA DE RESULTADO
             ═══════════════════════════════════════════ -->
        <div class="result-container">
            <div class="result-label" id="resultLabel">&iexcl;TU RETO ES!</div>
            <div class="result-text" id="resultText"></div>
            <div class="result-description" id="resultDescription"></div>
            <div class="inventor-container" id="inventorContainer">
                <label class="inventor-label" for="inventorInput">&iexcl;Escribe el reto para el siguiente cliente!</label>
                <input type="text" class="inventor-input" id="inventorInput" placeholder="Ej: Que pida su chesco con voz de Mickey Mouse">
                <button type="button" class="inventor-save-btn" id="inventorSaveBtn">&iexcl;GUARDAR RETO!</button>
                <div class="inventor-saved-msg" id="inventorSavedMsg"></div>
            </div>
            <div class="saved-retos-panel" id="savedRetosPanel">
                <div class="saved-retos-title">📋 Retos inventados guardados (<span id="savedRetosCount">0</span>)</div>
                <ul class="saved-retos-list" id="savedRetosList"></ul>
                <div class="saved-retos-actions">
                    <button type="button" id="linkTxtBtn">Vincular archivo .txt</button>
                    <button type="button" id="downloadTxtBtn">Descargar .txt</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           CONFIGURACION DE LA RULETA - RETOS Y PROBABILIDADES
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

           SISTEMA DE PESOS (WEIGHTS):
           =============================
           Cada reto tiene un "peso" que controla su probabilidad de salir.
           NO es equiprobable: retos con MAYOR peso tienen MAS chances de salir.

           Formula:
           Probabilidad de un reto = peso_del_reto / suma_de_todos_los_pesos

           EJEMPLO PRACTICO:

        const SoundFX = {
            ctx: null,

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            playTick() {
                if (!soundEnabled || !this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(800 + Math.random() * 400, t);
                osc.type = 'square';
                gain.gain.setValueAtTime(0.08, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                osc.start(t);
                osc.stop(t + 0.05);
            },

            playSpinStart() {
                if (!soundEnabled || !this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(600, t + 0.3);
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.12, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
                osc.start(t);
                osc.stop(t + 0.35);
            },

            playWin(isJackpot) {
                if (!soundEnabled || !this.ctx) return;
                const t = this.ctx.currentTime;
                const notes = isJackpot
                    ? [523, 659, 784, 1047, 1319]
                    : [440, 554, 659, 880];
                notes.forEach(function(freq, i) {
                    const osc = SoundFX.ctx.createOscillator();
                    const gain = SoundFX.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(SoundFX.ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = isJackpot ? 'square' : 'triangle';
                    const start = t + i * 0.12;
                    gain.gain.setValueAtTime(0, start);
                    gain.gain.linearRampToValueAtTime(0.15, start + 0.03);
                    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.35);
                    osc.start(start);
                    osc.stop(start + 0.35);
                });
            },

            playSave() {
                if (!soundEnabled || !this.ctx) return;
                const t = this.ctx.currentTime;
                [660, 880].forEach(function(freq, i) {
                    const osc = SoundFX.ctx.createOscillator();
                    const gain = SoundFX.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(SoundFX.ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    const start = t + i * 0.1;
                    gain.gain.setValueAtTime(0.12, start);
                    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.2);
                    osc.start(start);
                    osc.stop(start + 0.2);
                });
            }
        };

        function getSavedRetos() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch (e) {
                return [];
            }
        }

        function formatRetosAsTxt(retos) {
            var lines = ['=== CHESKORETOS - RETOS INVENTADOS ===', ''];
            retos.forEach(function(entry, i) {
                lines.push((i + 1) + '. [' + entry.date + '] ' + entry.text);
            });
            lines.push('');
            return lines.join('\n');
        }

        function renderSavedRetosList() {
            var retos = getSavedRetos();
            savedRetosCount.textContent = retos.length;
            if (retos.length === 0) {
                savedRetosList.innerHTML = '<li style="color:#888">Aun no hay retos guardados</li>';
                return;
            }
            savedRetosList.innerHTML = retos.slice().reverse().slice(0, 10).map(function(entry) {
                return '<li><span class="reto-date">' + entry.date + '</span> — ' + escapeHtml(entry.text) + '</li>';
            }).join('');
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function downloadRetosTxt() {
            var retos = getSavedRetos();
            var blob = new Blob([formatRetosAsTxt(retos)], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'retos-inventados.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function openFileHandleDB() {
            return new Promise(function(resolve, reject) {
                var req = indexedDB.open(FILE_HANDLE_DB, 1);
                req.onupgradeneeded = function() {
                    req.result.createObjectStore(FILE_HANDLE_STORE);
                };
                req.onsuccess = function() { resolve(req.result); };
                req.onerror = function() { reject(req.error); };
            });
        }

        async function storeFileHandle(handle) {
            try {
                var db = await openFileHandleDB();
                var tx = db.transaction(FILE_HANDLE_STORE, 'readwrite');
                tx.objectStore(FILE_HANDLE_STORE).put(handle, FILE_HANDLE_KEY);
                retosFileHandle = handle;
            } catch (e) {
                console.warn('No se pudo guardar referencia al archivo', e);
            }
        }

        async function loadStoredFileHandle() {
            try {
                var db = await openFileHandleDB();
                var tx = db.transaction(FILE_HANDLE_STORE, 'readonly');
                var req = tx.objectStore(FILE_HANDLE_STORE).get(FILE_HANDLE_KEY);
                return new Promise(function(resolve) {
                    req.onsuccess = function() {
                        var handle = req.result;
                        if (handle && typeof handle.queryPermission === 'function') {
                            handle.queryPermission({ mode: 'readwrite' }).then(function(perm) {
                                if (perm === 'granted') {
                                    retosFileHandle = handle;
                                }
                                resolve(handle);
                            }).catch(function() { resolve(null); });
                        } else {
                            resolve(null);
                        }
                    };
                    req.onerror = function() { resolve(null); };
                });
            } catch (e) {
                return null;
            }
        }

        async function appendLineToTxtFile(line) {
            if (!retosFileHandle) return false;
            try {
                var perm = await retosFileHandle.queryPermission({ mode: 'readwrite' });
                if (perm !== 'granted') {
                    perm = await retosFileHandle.requestPermission({ mode: 'readwrite' });
                }
                if (perm !== 'granted') return false;

                var file = await retosFileHandle.getFile();
                var existing = file.size > 0 ? await file.text() : '=== CHESKORETOS - RETOS INVENTADOS ===\n\n';
                var writable = await retosFileHandle.createWritable();
                await writable.write(existing + line + '\n');
                await writable.close();
                return true;
            } catch (e) {
                console.warn('Error escribiendo archivo', e);
                retosFileHandle = null;
                return false;
            }
        }

        function createSparks(container) {
            var rect = container.getBoundingClientRect();
            var cx = rect.width / 2;
            var cy = rect.height / 2;
            for (var i = 0; i < 12; i++) {
                var spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = cx + 'px';
                spark.style.top = cy + 'px';
                spark.style.background = ['#FFCC00', '#FF6600', '#FF3300', '#FFD700'][i % 4];
                var angle = (Math.PI * 2 * i) / 12;
                var dist = 80 + Math.random() * 60;
                spark.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                spark.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                container.appendChild(spark);
                setTimeout(function() { spark.remove(); }, 800);
            }
        }

        // Estado de la ruleta
        let currentRotation = 0;    // Angulo actual de rotacion (en radianes)
        let isSpinning = false;     // Bandera: esta girando?
        let animationId = null;     // ID para cancelar la animacion

        // Constantes geometricas
        const CENTER_X = canvas.width / 2;
        const CENTER_Y = canvas.height / 2;
        const RADIUS = canvas.width / 2 - 20;  // Radio con margen para el borde
        const NUM_SECTIONS = CHALLENGES.length;
        const ARC_ANGLE = (2 * Math.PI) / NUM_SECTIONS;  // Angulo de cada gajo

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           FUNCION: DIBUJAR LA RULETA
           Dibuja los gajos, colores y texto en el canvas
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
        function drawWheel() {
            // Limpiar el canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Guardar el estado del contexto y aplicar rotacion
            ctx.save();
            ctx.translate(CENTER_X, CENTER_Y);
            ctx.rotate(currentRotation);
            ctx.translate(-CENTER_X, -CENTER_Y);

            // Dibujar cada gajo
            for (let i = 0; i < NUM_SECTIONS; i++) {
                const startAngle = i * ARC_ANGLE - Math.PI / 2;  // -PI/2 para empezar arriba
                const endAngle = startAngle + ARC_ANGLE;

                // Dibujar el gajo (sector circular)
                ctx.beginPath();
                ctx.moveTo(CENTER_X, CENTER_Y);
                ctx.arc(CENTER_X, CENTER_Y, RADIUS, startAngle, endAngle);
                ctx.closePath();

                // Rellenar con el color del reto
                ctx.fillStyle = CHALLENGES[i].color;
                ctx.fill();

                // Borde negro entre gajos
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 3;
                ctx.stroke();

                // Dibujar el TEXTO en el gajo
                // Calculamos el angulo medio del gajo para posicionar el texto
                const midAngle = startAngle + ARC_ANGLE / 2;

                // Posicion del texto: a 65% del radio desde el centro
                const textRadius = RADIUS * 0.65;
                const textX = CENTER_X + Math.cos(midAngle) * textRadius;
                const textY = CENTER_Y + Math.sin(midAngle) * textRadius;

                ctx.save();
                ctx.translate(textX, textY);
                // Rotar el texto para que apunte hacia afuera del centro
                ctx.rotate(midAngle + Math.PI / 2);

                // Configurar fuente
                ctx.font = "bold 14px 'Arial Black', 'Impact', sans-serif";
                ctx.fillStyle = "#FFFFFF";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                // Contorno negro al texto para legibilidad
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 4;
                ctx.lineJoin = "round";

                // Dibujar texto con contorno (stroke primero, luego fill)
                const displayText = CHALLENGES[i].wheelText || CHALLENGES[i].text;
                ctx.strokeText(displayText, 0, 0);
                ctx.fillText(displayText, 0, 0);

                ctx.restore();
            }

            // Circulo central negro (donde va la K)
            ctx.beginPath();
            ctx.arc(CENTER_X, CENTER_Y, 45, 0, 2 * Math.PI);
            ctx.fillStyle = "#000000";
            ctx.fill();
            ctx.strokeStyle = "#FFCC00";
            ctx.lineWidth = 4;
            ctx.stroke();

            // Borde exterior decorativo (circulo con borde grueso)
            ctx.beginPath();
            ctx.arc(CENTER_X, CENTER_Y, RADIUS, 0, 2 * Math.PI);
            ctx.strokeStyle = "#FFCC00";
            ctx.lineWidth = 6;
            ctx.stroke();

            ctx.restore();  // Restaurar estado (quitar rotacion)
        }

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           FUNCION: SELECCIONAR GANADOR POR PESOS
           Usa el sistema de probabilidades ponderadas
           para elegir que reto saldra
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
        function selectWinner() {
            // Paso 1: Calcular la suma total de todos los pesos
            const totalWeight = CHALLENGES.reduce((sum, ch) => sum + ch.weight, 0);

            // Paso 2: Generar un numero aleatorio entre 0 y totalWeight
            let random = Math.random() * totalWeight;

            // Paso 3: Recorrer los retos restando pesos hasta encontrar el ganador
            // El reto cuyo peso hace que random baje de cero es el ganador
            for (let i = 0; i < CHALLENGES.length; i++) {
                random -= CHALLENGES[i].weight;
                if (random <= 0) {
                    return i;  // Retornar el indice del reto ganador
                }
            }

            // Fallback (nunca deberia llegar aqui, pero por seguridad)
            return CHALLENGES.length - 1;
        }

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           FUNCION: CALCULAR ANGULO OBJETIVO
           Determina cuanto debe girar la ruleta para que
           el gajo ganador quede exactamente en la flecha
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
           function calculateTargetAngle(winnerIndex) {

            // Centro REAL del gajo
            const winnerCenterAngle =
                winnerIndex * ARC_ANGLE -
                Math.PI / 2 +
                ARC_ANGLE / 2;

            // Queremos que ese centro quede justo bajo la flecha
            return -Math.PI / 2 - winnerCenterAngle;

            }

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           FUNCION: ANIMACION IDLE CONTINUA
           La ruleta gira suavemente en bucle para ser llamativa
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
        function startIdleSpin() {
            if (isIdleSpinning || isSpinning) return;
            isIdleSpinning = true;

            function idleAnimate() {
                if (!isIdleSpinning) return;

                idleRotation += IDLE_SPEED;
                // Mantener dentro de 0-2PI para evitar overflow
                if (idleRotation > 2 * Math.PI) {
                    idleRotation -= 2 * Math.PI;
                }

                // Combinar rotación idle con rotación actual
                currentRotation = idleRotation;
                drawWheel();

                idleAnimationId = requestAnimationFrame(idleAnimate);
            }

            idleAnimationId = requestAnimationFrame(idleAnimate);
        }

        function stopIdleSpin() {
            isIdleSpinning = false;
            if (idleAnimationId) {
                cancelAnimationFrame(idleAnimationId);
                idleAnimationId = null;
            }
        }

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           FUNCION: ANIMAR EL GIRO
           Gira la ruleta con animacion fluida y desaceleracion
           usando la tecnica de "easing" ease-out
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
        function spinWheel() {
            // Si ya esta girando, no hacer nada
            if (isSpinning) return;

            SoundFX.init();
            SoundFX.playSpinStart();

            // === NUEVO: Detener animación idle antes de girar ===
            stopIdleSpin();

            isSpinning = true;
            spinBtn.disabled = true;
            lastTickSection = -1;

            wheelContainer.classList.add('spinning');
            wheelContainer.classList.remove('landing');
            logoContainer.classList.add('spin-active');
            arrowIndicator.classList.remove('landing');

            // Ocultar resultado anterior
            resultLabel.classList.remove('visible');
            resultText.classList.remove('visible', 'animate', 'jackpot');
            resultDescription.classList.remove('visible');
            inventorContainer.classList.remove('visible');
            inventorSavedMsg.classList.remove('visible');
            resultText.textContent = '';
            resultDescription.textContent = '';
            inventorInput.value = '';

            // PASO 1: Elegir el ganador usando el sistema de pesos
            const winnerIndex = selectWinner();
            console.log('Ganador preseleccionado:', CHALLENGES[winnerIndex].text,
                        '(Indice:', winnerIndex + ')');

            // PASO 2: Calcular el angulo objetivo
            const targetAngle = calculateTargetAngle(winnerIndex);

            // PASO 3: Configurar la animacion
            const spinDuration = 4000;      // Duracion total: 4 segundos
            const minSpins = 5;              // Minimo de vueltas completas

            // Angulo inicial actual
            const startAngle = currentRotation;

            // Calcular la rotacion total:
            // - Varias vueltas completas (para efecto dramatico)
            // - Mas el angulo necesario para llegar al ganador
            // Normalizamos para que el resultado sea siempre positivo y suave
            const extraSpins = minSpins * 2 * Math.PI;

            // Ajustar el angulo objetivo para que termine en la direccion correcta
            // despues de las vueltas extras
            let targetFinal = targetAngle + extraSpins;

            // Asegurar que siempre gire hacia adelante (sentido horario)
            while (targetFinal < startAngle + extraSpins) {
                targetFinal += 2 * Math.PI;
            }

            // Agregar un pequeno offset aleatorio dentro del gajo para que
            // no siempre pare exactamente en el centro (mas realista)
            const randomOffset = (Math.random() - 0.5) * ARC_ANGLE * 0.2;
            targetFinal += randomOffset;

            // Variables para la animacion
            const startTime = performance.now();

            // Funcion de animacion (se ejecuta ~60 veces por segundo)
            function animate(currentTime) {
                // Calcular el tiempo transcurrido
                const elapsed = currentTime - startTime;

                // Progreso de 0 a 1
                let progress = elapsed / spinDuration;

                if (progress >= 1) {
                    // La animacion termino
                    progress = 1;
                    currentRotation = targetFinal;
                    drawWheel();

                    wheelContainer.classList.remove('spinning');
                    wheelContainer.classList.add('landing');
                    logoContainer.classList.remove('spin-active');
                    arrowIndicator.classList.add('landing');
                    setTimeout(function() {
                        wheelContainer.classList.remove('landing');
                        arrowIndicator.classList.remove('landing');
                    }, 700);

                    // Mostrar el resultado
                    showResult(winnerIndex);

                    // Reactivar el boton
                    isSpinning = false;
                    spinBtn.disabled = false;

                    // Normalizar la rotacion para mantener numeros manejables
                    currentRotation = currentRotation % (2 * Math.PI);
                    idleRotation = currentRotation; // Sincronizar idle con posición final

                    // === NUEVO: Reiniciar animación idle después del resultado ===
                    setTimeout(function() {
                        if (!isSpinning) {
                            startIdleSpin();
                        }
                    }, 3000); // Esperar 3 segundos después del resultado

                    return;  // Terminar la animacion
                }

                // EASING: Funcion ease-out cubica
                const easeOut = 1 - Math.pow(1 - progress, 3);

                // Calcular la rotacion actual interpolada
                currentRotation = startAngle + (targetFinal - startAngle) * easeOut;

                // Sonido de tick al pasar cada gajo
                var normalizedRot = ((currentRotation % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
                var currentSection = Math.floor(normalizedRot / ARC_ANGLE) % NUM_SECTIONS;
                if (currentSection !== lastTickSection) {
                    SoundFX.playTick();
                    lastTickSection = currentSection;
                }

                // Chispas ocasionales mientras gira
                if (Math.random() < 0.08) {
                    createSparks(wheelContainer);
                }

                // Dibujar la ruleta con la nueva rotacion
                drawWheel();

                // Solicitar el siguiente frame de animacion
                animationId = requestAnimationFrame(animate);
            }

            // Iniciar la animacion
            animationId = requestAnimationFrame(animate);
        }

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           FUNCION: MOSTRAR RESULTADO
           Muestra el reto ganador con animacion
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
        function showResult(winnerIndex) {
            const winner = CHALLENGES[winnerIndex];
            const isJackpot = winner.wheelText === 'GRATIS';

            flashScreen();
            shakeScreen();
            SoundFX.playWin(isJackpot);

            // Cambiar el color del borde del resultado al color del gajo ganador
            resultText.style.borderColor = winner.color;
            resultText.style.textShadow = `
                3px 3px 0 ${winner.color},
                6px 6px 0 #000000,
                0 0 20px ${winner.color}80
            `;

            resultText.textContent = winner.emoji ? winner.emoji + ' ' + winner.text : winner.text;
            if (isJackpot) {
                resultText.classList.add('jackpot');
            }

            resultDescription.innerHTML =
                winner.description +
                '<span class="price">' + winner.price + '</span>';

            if (winner.hasInput) {
                inventorContainer.classList.add('visible');
                setTimeout(function() { inventorInput.focus(); }, 600);
            } else {
                inventorContainer.classList.remove('visible');
            }

            // Mostrar con animacion
            resultLabel.classList.add('visible');
            resultText.classList.add('visible', 'animate');
            resultDescription.classList.add('visible');

            // Efecto de confeti para celebrar
            createConfetti(isJackpot ? 60 : 30);
            createSparks(wheelContainer);
        }

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           FUNCION: CONFETI
           Crea particulas de confeti para celebrar
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
        function createConfetti(count) {
            count = count || 30;
            const colors = ['#FF6600', '#FFCC00', '#FF3300', '#2196F3', '#4CAF50', '#E91E63', '#FFD700'];

            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 1 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = (Math.random() * 10 + 5) + 'px';
                document.body.appendChild(confetti);

                // Limpiar despues de la animacion
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           FUNCION: CREAR LUCES DE FERIA DECORATIVAS
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
        function createLights() {
            const container = document.getElementById('lights');
            const colors = ['#FFCC00', '#FF3300', '#FF6600', '#FFEB3B'];

            for (let i = 0; i < 20; i++) {
                const light = document.createElement('div');
                light.className = 'light';
                light.style.left = Math.random() * 100 + '%';
                light.style.top = Math.random() * 100 + '%';
                light.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                light.style.animationDelay = Math.random() * 2 + 's';
                light.style.boxShadow = `0 0 10px ${light.style.backgroundColor}`;
                container.appendChild(light);
            }
        }

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           INICIALIZACION
           Dibuja la ruleta al cargar la pagina
           %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
        drawWheel();
        createLights();
        renderSavedRetosList();
        loadStoredFileHandle();

        // === NUEVO: Iniciar animación idle continua al cargar ===
        startIdleSpin();

        /* %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
           GUIA RAPIDA PARA MODIFICAR LA RULETA:
           =====================================

           1. AGREGAR UN NUEVO RETO:
              - Agrega un nuevo objeto al arreglo CHALLENGES arriba
              - Dale un "text" (lo que se muestra), "color" (color del gajo)
                y "weight" (probabilidad relativa)
              - Si pones mas de 6 retos, los gajos se ajustan automaticamente!

           2. CAMBIAR COLORES DE LOS GAJOS:
              - Modifica la propiedad "color" de cada reto
              - Usa nombres ("red"), hex ("#FF0000"), rgb ("rgb(255,0,0)")

           3. AJUSTAR PROBABILIDADES (PESOS):
              - Cambia el valor "weight" de cada reto
              - Mayor weight = mas probable que salga
              - Menor weight = menos probable
              - Puedes poner cualquier numero entero positivo

           4. EJEMPLO: Hacer que "RETO EXTREMO" sea casi imposible:
              { text: "RETO EXTREMO", color: "#FF6600", weight: 1 }
              Y otro reto muy probable:
              { text: "CUENTA UN CHISTE", color: "#E91E63", weight: 10 }

           5. CAMBIAR TIEMPO DE GIRO:
              - Busca "spinDuration" en la funcion spinWheel()
              - Cambia el valor (esta en milisegundos, 4000 = 4 segundos)
        %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%% */
    </script>
